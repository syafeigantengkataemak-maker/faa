<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Rumah Makan Lilac</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero hero-terminal">
    <div class="hero-content terminal-content">
      <p class="eyebrow">Terminal</p>
      <h1>Terminal Rumah Makan Lilac</h1>
      <div class="terminal-window">
        <div class="terminal-header">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <p>lilac-terminal</p>
        </div>
        <div class="terminal-body">
          <p><span class="prompt">$</span> help
            <span class="output">Menampilkan perintah yang tersedia.</span>
          </p>
          <p><span class="prompt">$</span> menu
            <span class="output">Menampilkan daftar menu andalan.</span>
          </p>
          <p><span class="prompt">$</span> kontak
            <span class="output">Menampilkan informasi kontak rumah makan.</span>
          </p>
        </div>
      </div>
      <a class="button" href="index.html">Kembali ke Beranda</a>
    </div>
  </header>
</body>
</html>
